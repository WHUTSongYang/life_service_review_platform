# 复制到 /etc/nginx/conf.d/life-review.conf 后 nginx -t && systemctl reload nginx
# 将 server_name 改为你的域名或 _ 
# 前端静态：root 指向 frontend 构建产物 dist
# 后端：反代到本机 8080（与 application.yml server.port 一致）

upstream life_review_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /opt/life_review_platform/www;
    index index.html;

    location /api/ {
        proxy_pass http://life_review_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 本地模式上传文件访问（与 app.upload.public-prefix 一致）
    location /uploads/ {
        proxy_pass http://life_review_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # AI 客服 SSE
    location /api/ai/chat/stream {
        proxy_pass http://life_review_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

